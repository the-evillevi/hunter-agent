<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>hunter-agent</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}" />
    <!-- HTMX lets server-rendered HTML feel interactive without a frontend build step. -->
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  </head>
  <body class="bg-base-200 text-base-content min-h-screen antialiased">
    <header
      class="mx-auto flex w-[min(960px,calc(100%-2rem))] flex-col gap-4 py-8 sm:flex-row sm:items-center sm:justify-between"
    >
      <div>
        <p class="text-base-content/60 mb-1 text-xs font-semibold uppercase">
          Job scraping agent
        </p>
        <h1 class="text-base-content text-3xl font-bold tracking-normal">
          hunter-agent
        </h1>
      </div>
      <nav class="flex items-center gap-1" aria-label="Primary navigation">
        <a class="btn btn-ghost btn-sm" href="/">Home</a>
        <a class="btn btn-ghost btn-sm" href="/companies">Companies</a>
        <a class="btn btn-ghost btn-sm" href="/health">Health</a>
      </nav>
    </header>

    <main class="mx-auto w-[min(960px,calc(100%-2rem))] pb-8">
      {% block content %}{% endblock %}
    </main>
    <script>
      document.body.addEventListener("htmx:beforeSwap", (event) => {
        const contentType =
          event.detail.xhr.getResponseHeader("content-type") || "";
        if (
          event.detail.xhr.status >= 400 &&
          contentType.includes("text/html")
        ) {
          event.detail.shouldSwap = true;
          event.detail.isError = false;
        }
      });
    </script>
  </body>
</html>
