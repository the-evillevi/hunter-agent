{% extends "base.html" %}

{% block content %}
  <section class="card border-base-300 bg-base-100 border shadow-sm">
    <div class="card-body">
      <div
        class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between"
      >
        <div>
          <h2 class="card-title">Job sources</h2>
          <p class="text-base-content/60 mt-1 text-sm">
            Runtime source enablement is stored in SQLite.
          </p>
        </div>

        <button
          type="button"
          class="btn btn-primary"
          hx-get="/sources/partials/list"
          hx-target="#sources-panel"
          hx-swap="innerHTML"
        >
          Refresh
        </button>
      </div>

      <div id="sources-panel">{% include "_sources_list.html" %}</div>
    </div>
  </section>

  <section class="card border-base-300 bg-base-100 mt-4 border shadow-sm">
    <div class="card-body">
      <div
        class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between"
      >
        <div>
          <h2 class="card-title">Tracked jobs</h2>
          <p class="text-base-content/60 mt-1 text-sm">
            These rows come from SQLite. The scraper will add more later.
          </p>
        </div>

        <button
          type="button"
          class="btn btn-primary"
          hx-get="/jobs/partials/list"
          hx-target="#jobs-list"
          hx-swap="innerHTML"
        >
          Refresh
        </button>
      </div>

      <div id="jobs-list">{% include "_jobs_list.html" %}</div>
    </div>
  </section>
{% endblock %}
