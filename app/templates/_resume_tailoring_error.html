<div class="alert alert-error mt-2" role="alert">
  <div>
    <p class="font-medium">Tailoring could not be completed.</p>
    <p class="text-sm">
      {% if provider %}
        The {{ provider }} provider is unavailable: {{ message }}.
      {% else %}
        {{ message }}.
      {% endif %}
      The master resume was not modified and no partial variant was saved.
    </p>
  </div>
</div>
