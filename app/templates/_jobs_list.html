{% if blacklist_error %}
  <div class="alert alert-error mb-2 text-sm" role="alert">
    {{ blacklist_error }}
  </div>
{% endif %}

{% if jobs %}
  <div class="overflow-x-auto">
    <table class="table-zebra table">
      <thead>
        <tr>
          <th>Role</th>
          <th>Company</th>
          <th>Location</th>
          <th>Source</th>
          <th>Score</th>
          <th>Blacklist</th>
          <th>Tailor resume</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        {% for job in jobs %}
          {% include "_job_row.html" %}
        {% endfor %}
      </tbody>
    </table>
  </div>
{% else %}
  <p class="text-base-content/60 text-sm">
    No jobs found yet. TODO: run seed data or implement the first scraper.
  </p>
{% endif %}
