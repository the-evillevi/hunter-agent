{% extends "base.html" %}

{% block content %}
  <section class="rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
    <div
      class="mb-6 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between"
    >
      <div>
        <h2 class="text-xl font-bold text-slate-950">Tracked jobs</h2>
        <p class="mt-1 text-sm text-slate-500">
          These rows come from SQLite. The scraper will add more later.
        </p>
      </div>

      <button
        type="button"
        class="rounded-md bg-teal-700 px-4 py-2 font-bold text-white hover:bg-teal-800"
        hx-get="/jobs"
        hx-target="#jobs-list"
        hx-swap="innerHTML"
      >
        Refresh
      </button>
    </div>

    <div id="jobs-list">{% include "jobs.html" %}</div>
  </section>
{% endblock %}
